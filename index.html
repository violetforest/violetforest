<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#f0eaf5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>violet forest</title>
    <link rel="alternate" type="application/rss+xml" title="violet's space" href="/violetforest/feed.xml" />
    <link rel="webmention" href="https://webmention.io/violetforest.com/webmention" />
  </head>
  <body>
    <div id="root"><div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000"><span style="color:#8844ff;font-family:monospace;font-size:14px">Loading...</span></div></div>
    <script>
      // GitHub Pages SPA redirect handler
      (function() {
        var q = new URLSearchParams(window.location.search);
        var p = q.get('p');
        if (p) {
          q.delete('p');
          var qs = q.toString();
          window.history.replaceState(null, '', p + (qs ? '?' + qs : '') + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
