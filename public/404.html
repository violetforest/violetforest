<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Single-page app redirect for GitHub Pages
      // Redirects all 404s to index.html with the path preserved
      var path = window.location.pathname
      window.location.replace(window.location.origin + path)
    </script>
  </head>
  <body></body>
</html>
