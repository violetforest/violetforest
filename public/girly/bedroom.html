<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bedroom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #ff66aa;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #fff0f7;
  }
  canvas { display: block; }

  /* ── hud ─────────────────────────────────────────── */
  #hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  #crosshair {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 4px;
    height: 4px;
    margin: -2px 0 0 -2px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px #ff66aa, 0 0 14px #ff3388, 0 1px 0 rgba(180,40,100,0.6);
  }

  #prompt {
    position: absolute;
    left: 50%;
    top: 58%;
    transform: translateX(-50%);
    padding: 8px 18px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #4a1a36;
    background: linear-gradient(180deg, #ffe8f3 0%, #ffc9e0 50%, #ff9fcc 100%);
    border: 1.5px solid rgba(255, 110, 170, 0.95);
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(255, 80, 150, 0.5), inset 0 1px 0 rgba(255,255,255,0.85);
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  #prompt.show { opacity: 1; }

  #controls-hint {
    position: absolute;
    left: 14px;
    bottom: 14px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 11px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(180, 40, 100, 0.85);
    letter-spacing: 0.5px;
    line-height: 1.8;
    opacity: 0.85;
  }
  #controls-hint b {
    color: #4a1a36;
    font-weight: 600;
    background: linear-gradient(180deg, #ffe8f3, #ffc9e0);
    padding: 2px 6px;
    border: 1px solid rgba(255, 110, 170, 0.9);
    border-radius: 4px;
    margin-right: 2px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  }

  /* ── intro overlay (Aero pink) ──────────────────── */
  #intro {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, #ffd6ea 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, #ffa0cf 0%, transparent 60%),
      linear-gradient(180deg, #ffb3d9 0%, #ff66aa 100%);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.6s;
    font-family: "Segoe UI", Tahoma, sans-serif;
  }
  #intro.fade { opacity: 0; pointer-events: none; }

  #intro .title {
    font-family: "Comic Sans MS", "Segoe UI", cursive, sans-serif;
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 4px;
    color: #fff;
    -webkit-text-stroke: 2px rgba(180,30,90,0.9);
    text-shadow:
      0 4px 12px rgba(180, 40, 100, 0.55),
      0 0 22px rgba(255,255,255,0.6);
    text-transform: lowercase;
    animation: flicker 4s infinite;
  }
  #intro .sub {
    margin-top: 18px;
    font-size: 13px;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(180,40,100,0.8);
    text-transform: uppercase;
    opacity: 0.95;
  }
  #intro .keys {
    margin-top: 42px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(180,40,100,0.7);
    opacity: 0.95;
    line-height: 2.1;
  }
  #intro .keys b {
    color: #4a1a36;
    font-weight: 600;
    background: linear-gradient(180deg, #ffe8f3, #ffc9e0);
    padding: 3px 8px;
    border: 1px solid rgba(255, 110, 170, 0.95);
    border-radius: 6px;
    margin: 0 3px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 2px 4px rgba(255,80,150,0.3);
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    91% { opacity: 1; }
    92% { opacity: 0.4; }
    93% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
  }

  /* ── desktop overlay (when sitting) ──────────────── */
  #desktop-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    background: radial-gradient(ellipse at center, rgba(255, 200, 230, 0.25) 30%, rgba(180, 40, 100, 0.7) 90%);
    opacity: 0;
    transition: opacity 0.5s;
  }
  #desktop-overlay.active { display: block; }
  #desktop-overlay.visible { opacity: 1; }

  .monitor-frame {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(88vw, 1180px);
    height: min(74vh, 760px);
    background: linear-gradient(180deg, #ffe8f3 0%, #ffc9e0 50%, #ff9fcc 100%);
    border-radius: 14px;
    padding: 22px 22px 52px 22px;
    border: 1.5px solid rgba(255, 110, 170, 0.95);
    box-shadow:
      0 0 0 4px rgba(255, 240, 248, 0.6),
      0 12px 40px rgba(255, 80, 150, 0.55),
      0 0 80px rgba(255, 102, 204, 0.45),
      inset 0 1px 0 rgba(255,255,255,0.85),
      inset 0 -3px 8px rgba(180, 40, 100, 0.15);
  }
  .monitor-frame::before {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    width: 50px;
    height: 5px;
    background: linear-gradient(180deg, #ff9fcc, #dd4488);
    border-radius: 3px;
    box-shadow: 0 0 8px #ff66aa, 0 1px 0 rgba(255,255,255,0.5);
  }
  .monitor-frame::after {
    content: "✦";
    position: absolute;
    right: 22px;
    bottom: 22px;
    font-size: 12px;
    color: #dd4488;
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    opacity: 0.85;
  }

  .screen-inner {
    width: 100%;
    height: 100%;
    background: #fff5fa;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(170, 51, 102, 0.4);
    box-shadow: inset 0 0 30px rgba(255, 80, 150, 0.18), inset 0 0 4px rgba(255, 200, 230, 0.4);
  }
  .screen-inner iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  /* soft scanlines (subtle on pink) */
  .screen-inner::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 200, 230, 0) 0px,
      rgba(255, 200, 230, 0) 2px,
      rgba(180, 40, 100, 0.05) 2px,
      rgba(180, 40, 100, 0.05) 3px
    );
    pointer-events: none;
    z-index: 100;
  }
  /* gentle vignette */
  .screen-inner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(255, 102, 170, 0.25) 100%);
    pointer-events: none;
    z-index: 101;
  }

  #exit-sit {
    position: absolute;
    right: 28px;
    top: 28px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: #4a1a36;
    background: linear-gradient(180deg, #ffe8f3 0%, #ffc9e0 50%, #ff9fcc 100%);
    border: 1.5px solid rgba(255, 110, 170, 0.95);
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(255, 80, 150, 0.45), inset 0 1px 0 rgba(255,255,255,0.85);
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    cursor: pointer;
    text-transform: uppercase;
    z-index: 60;
    font-family: "Segoe UI", Tahoma, sans-serif;
    transition: all 0.15s;
  }
  #exit-sit:hover {
    background: linear-gradient(180deg, #fff0f8 0%, #ffd6ea 50%, #ffb0d6 100%);
    box-shadow: 0 6px 16px rgba(255, 80, 150, 0.6), inset 0 1px 0 rgba(255,255,255,0.95);
  }
  #exit-sit:active {
    background: linear-gradient(180deg, #ff9fcc 0%, #ffc9e0 50%, #ffe8f3 100%);
    box-shadow: inset 0 2px 4px rgba(180,40,100,0.3);
  }
</style>
</head>

<style>
  /* Static cursors (no rotation) — sparkle trail handled in JS below */
  html, body { cursor: url("gifs/cursors/tumblr_5d19db8c00d20d2baea1a986ec91490f_20fcc1c5_75.webp") 4 4, auto; }
  a, button, [role="button"], label, summary, select,
  input[type="button"], input[type="submit"], input[type="checkbox"], input[type="radio"],
  #prompt, #exit-sit {
    cursor: url("gifs/cursors/tumblr_465e9f20182f89577ec40f3bce4795f3_feaea217_75.webp") 4 4, pointer !important;
  }
</style>

<div id="hud">
  <div id="crosshair"></div>
  <div id="prompt">press E to sit</div>
  <div id="controls-hint">
    <b>MOUSE</b> look &nbsp; <b>E</b> sit &nbsp; <b>ESC</b> stand / release
  </div>
</div>

<div id="desktop-overlay">
  <div class="monitor-frame">
    <div class="screen-inner">
      <iframe id="desktop-iframe" src="desktop.html"></iframe>
    </div>
  </div>
  <button id="exit-sit">× stand up</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }

</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

// ═══════════════════════════════════════════════════════════════
// SCENE / CAMERA / RENDERER
// ═══════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0418);
scene.fog = new THREE.FogExp2(0x15051c, 0.045);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 60);
camera.position.set(0, 1.6, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

// CSS3D overlay for embedding live HTML (the desktop iframe) onto the 3D monitor screen
const cssRenderer = new CSS3DRenderer();
cssRenderer.setSize(innerWidth, innerHeight);
cssRenderer.domElement.style.position = 'fixed';
cssRenderer.domElement.style.top = '0';
cssRenderer.domElement.style.left = '0';
cssRenderer.domElement.style.pointerEvents = 'none';
cssRenderer.domElement.style.zIndex = '1';
document.body.appendChild(cssRenderer.domElement);
const cssScene = new THREE.Scene();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  cssRenderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════════════
// PROCEDURAL TEXTURES
// ═══════════════════════════════════════════════════════════════
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

// pink checker floor (pink & dark pink tiles)
function makeFloorTex() {
  const c = makeCanvas(512, 512);
  const ctx = c.getContext('2d');
  const tile = 64;
  for (let y = 0; y < 8; y++) {
    for (let x = 0; x < 8; x++) {
      const dark = (x + y) % 2 === 0;
      ctx.fillStyle = dark ? '#2a0a1c' : '#d870a8';
      ctx.fillRect(x * tile, y * tile, tile, tile);
      // subtle edge
      ctx.strokeStyle = dark ? '#3a1428' : '#e890c0';
      ctx.lineWidth = 1;
      ctx.strokeRect(x * tile + 0.5, y * tile + 0.5, tile - 1, tile - 1);
      // speckle
      ctx.fillStyle = dark ? 'rgba(255,180,220,0.06)' : 'rgba(255,255,255,0.08)';
      for (let i = 0; i < 30; i++) {
        ctx.fillRect(x * tile + Math.random() * tile, y * tile + Math.random() * tile, 1, 1);
      }
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 3);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// pink wall with subtle vertical gradient + little hearts pattern
function makeWallTex() {
  const c = makeCanvas(512, 512);
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#e088b4');
  grad.addColorStop(0.5, '#d878a8');
  grad.addColorStop(1, '#a85080');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 512);
  // faint stripes
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#fff';
  for (let x = 0; x < 512; x += 24) {
    ctx.fillRect(x, 0, 1, 512);
  }
  ctx.globalAlpha = 1;
  // tiny hearts scattered
  ctx.fillStyle = 'rgba(255, 200, 220, 0.18)';
  for (let i = 0; i < 30; i++) {
    const hx = Math.random() * 512;
    const hy = Math.random() * 512;
    ctx.beginPath();
    ctx.moveTo(hx, hy + 4);
    ctx.bezierCurveTo(hx, hy, hx - 6, hy, hx - 6, hy + 4);
    ctx.bezierCurveTo(hx - 6, hy + 8, hx, hy + 10, hx, hy + 14);
    ctx.bezierCurveTo(hx, hy + 10, hx + 6, hy + 8, hx + 6, hy + 4);
    ctx.bezierCurveTo(hx + 6, hy, hx, hy, hx, hy + 4);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// wood grain (for desk)
function makeWoodTex() {
  const c = makeCanvas(256, 256);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f8d0e0';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 40; i++) {
    ctx.strokeStyle = `rgba(180, 80, 120, ${0.05 + Math.random() * 0.08})`;
    ctx.lineWidth = 0.5 + Math.random() * 1.2;
    ctx.beginPath();
    const y = Math.random() * 256;
    ctx.moveTo(0, y);
    for (let x = 0; x < 256; x += 8) {
      ctx.lineTo(x, y + Math.sin(x * 0.03 + i) * 4);
    }
    ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// bed sheet pattern (pink with soft pattern)
function makeSheetTex() {
  const c = makeCanvas(256, 256);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffc0dc';
  ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = 'rgba(255, 80, 140, 0.15)';
  for (let y = 0; y < 256; y += 24) {
    for (let x = 0; x < 256; x += 24) {
      const ox = (y / 24) % 2 === 0 ? 0 : 12;
      ctx.beginPath();
      ctx.arc(x + ox, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 1);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ceiling: dark with stars
function makeCeilingTex() {
  const c = makeCanvas(512, 512);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a0818';
  ctx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const r = Math.random() * 1.4 + 0.3;
    ctx.fillStyle = `rgba(255, 220, 240, ${Math.random() * 0.7 + 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// poster (cute anime-ish girl silhouette, original)
function makePosterTex() {
  const c = makeCanvas(256, 384);
  const ctx = c.getContext('2d');
  // pink gradient bg
  const g = ctx.createLinearGradient(0, 0, 0, 384);
  g.addColorStop(0, '#ff77b8');
  g.addColorStop(0.5, '#d060a0');
  g.addColorStop(1, '#6020a0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 384);
  // sun disc
  ctx.fillStyle = '#fff0a0';
  ctx.beginPath();
  ctx.arc(128, 180, 70, 0, Math.PI * 2);
  ctx.fill();
  // sun stripes
  ctx.fillStyle = g;
  for (let y = 160; y < 260; y += 10) {
    ctx.fillRect(50, y, 160, 3);
  }
  // horizontal grid (vaporwave)
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const y = 260 + i * (15 + i * 2);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(256, y);
    ctx.stroke();
  }
  for (let i = -10; i <= 10; i++) {
    ctx.beginPath();
    ctx.moveTo(128, 260);
    ctx.lineTo(128 + i * 40, 384);
    ctx.stroke();
  }
  // title text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('dream.exe', 128, 42);
  ctx.font = '10px sans-serif';
  ctx.fillText('- a love letter -', 128, 60);
  // border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.strokeRect(4, 4, 248, 376);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// night sky through window
function makeSkyTex() {
  const c = makeCanvas(512, 512);
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#0a0222');
  g.addColorStop(0.4, '#2a0a48');
  g.addColorStop(0.75, '#8020a0');
  g.addColorStop(1, '#e860a8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 512, 512);
  // stars
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 380;
    const r = Math.random() * 1.8 + 0.2;
    ctx.fillStyle = `rgba(255, 240, 255, ${Math.random() * 0.9 + 0.1})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  // moon
  ctx.fillStyle = 'rgba(255, 240, 250, 0.95)';
  ctx.beginPath();
  ctx.arc(380, 110, 38, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(200, 160, 200, 0.4)';
  ctx.beginPath();
  ctx.arc(392, 108, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(368, 122, 6, 0, Math.PI * 2);
  ctx.fill();
  // moon halo
  const halo = ctx.createRadialGradient(380, 110, 40, 380, 110, 110);
  halo.addColorStop(0, 'rgba(255, 230, 240, 0.35)');
  halo.addColorStop(1, 'rgba(255, 230, 240, 0)');
  ctx.fillStyle = halo;
  ctx.fillRect(270, 0, 220, 220);
  // skyline silhouette
  ctx.fillStyle = '#150420';
  ctx.fillRect(0, 380, 512, 132);
  // buildings
  for (let x = 0; x < 512; ) {
    const w = 20 + Math.random() * 40;
    const h = 30 + Math.random() * 80;
    ctx.fillStyle = '#0a0210';
    ctx.fillRect(x, 380 - h, w, h);
    // windows
    for (let wy = 380 - h + 6; wy < 380 - 4; wy += 8) {
      for (let wx = x + 4; wx < x + w - 4; wx += 8) {
        if (Math.random() > 0.4) {
          ctx.fillStyle = Math.random() > 0.6 ? '#ffdd99' : '#ff88cc';
          ctx.fillRect(wx, wy, 3, 3);
        }
      }
    }
    x += w + 2;
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// monitor off-state screen (dim pink with subtle reflection)
function makeMonitorOffTex() {
  const c = makeCanvas(256, 192);
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 256, 192);
  g.addColorStop(0, '#1a0612');
  g.addColorStop(0.5, '#28081c');
  g.addColorStop(1, '#0a0208');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 192);
  // subtle scanlines
  ctx.fillStyle = 'rgba(255, 120, 180, 0.04)';
  for (let y = 0; y < 192; y += 2) ctx.fillRect(0, y, 256, 1);
  // power led hint reflection
  const gg = ctx.createRadialGradient(60, 60, 4, 60, 60, 60);
  gg.addColorStop(0, 'rgba(255, 120, 180, 0.2)');
  gg.addColorStop(1, 'rgba(255, 120, 180, 0)');
  ctx.fillStyle = gg;
  ctx.fillRect(0, 0, 256, 192);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// monitor on (when sitting) — a pink desktop preview
function makeMonitorOnTex() {
  const c = makeCanvas(512, 384);
  const ctx = c.getContext('2d');
  // bg
  ctx.fillStyle = '#e8a8c8';
  ctx.fillRect(0, 0, 512, 384);
  // grid
  ctx.strokeStyle = 'rgba(255, 180, 210, 0.5)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 512; x += 32) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 384); ctx.stroke();
  }
  for (let y = 0; y < 384; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke();
  }
  // some icons
  const icons = [
    { x: 30, y: 30, label: 'my pc' },
    { x: 30, y: 110, label: 'diary' },
    { x: 30, y: 190, label: 'mail' },
    { x: 30, y: 270, label: 'paint' }
  ];
  for (const i of icons) {
    ctx.fillStyle = '#ffc0dc';
    ctx.strokeStyle = '#5a1a38';
    ctx.lineWidth = 2;
    ctx.fillRect(i.x, i.y, 44, 44);
    ctx.strokeRect(i.x, i.y, 44, 44);
    ctx.fillStyle = '#5a1a38';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i.label, i.x + 22, i.y + 60);
  }
  // window
  ctx.fillStyle = '#fbe0ed';
  ctx.strokeStyle = '#5a1a38';
  ctx.lineWidth = 2;
  ctx.fillRect(120, 70, 300, 220);
  ctx.strokeRect(120, 70, 300, 220);
  // title bar
  const tb = ctx.createLinearGradient(120, 70, 420, 70);
  tb.addColorStop(0, '#bb2e72');
  tb.addColorStop(1, '#ffb6d4');
  ctx.fillStyle = tb;
  ctx.fillRect(122, 72, 296, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('hello world.txt', 128, 86);
  // content
  ctx.fillStyle = '#3a1a28';
  ctx.font = '11px monospace';
  const lines = [
    'welcome back...',
    '',
    'it\'s quiet in here.',
    'the lamp is still on.',
    'outside, the city hums.',
    '',
    '> type something...'
  ];
  lines.forEach((l, i) => ctx.fillText(l, 136, 115 + i * 16));
  // taskbar
  ctx.fillStyle = '#c8689a';
  ctx.fillRect(0, 356, 512, 28);
  ctx.fillStyle = '#ffd4e8';
  ctx.fillRect(6, 360, 50, 20);
  ctx.fillStyle = '#5a1a38';
  ctx.font = 'bold 10px sans-serif';
  ctx.fillText('start', 18, 373);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// plushie face
function makePlushieFaceTex() {
  const c = makeCanvas(128, 128);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffd6e4';
  ctx.fillRect(0, 0, 128, 128);
  // eyes
  ctx.fillStyle = '#2a0812';
  ctx.beginPath();
  ctx.arc(44, 60, 6, 0, Math.PI * 2);
  ctx.arc(84, 60, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(46, 58, 2, 0, Math.PI * 2);
  ctx.arc(86, 58, 2, 0, Math.PI * 2);
  ctx.fill();
  // cheeks
  ctx.fillStyle = 'rgba(255, 100, 140, 0.7)';
  ctx.beginPath();
  ctx.arc(34, 76, 5, 0, Math.PI * 2);
  ctx.arc(94, 76, 5, 0, Math.PI * 2);
  ctx.fill();
  // mouth
  ctx.strokeStyle = '#2a0812';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(64, 78, 4, 0, Math.PI);
  ctx.stroke();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function addWall(w, h, x, y, z, ry, hasTex = true, color = 0xd878a8) {
  const g = new THREE.PlaneGeometry(w, h);
  const m = new THREE.MeshStandardMaterial({
    map: hasTex ? wallTex.clone() : null,
    color: hasTex ? 0xffffff : color,
    roughness: 0.85,
    metalness: 0.05,
    side: THREE.DoubleSide
  });
  if (hasTex) {
    m.map.repeat.set(w / 3, h / 3);
    m.map.needsUpdate = true;
  }
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, y, z);
  mesh.rotation.y = ry;
  mesh.receiveShadow = true;
  roomGroup.add(mesh);
  return mesh;
}

// The first image shows "THINGS" — we do something different like "vibes" so it's not a direct copy
function makeNeonTex(text) {
  const c = makeCanvas(1024, 256);
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.clearRect(0, 0, 1024, 256);
  ctx.font = 'bold 140px "Brush Script MT", cursive';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // outer glow layers
  for (let i = 14; i > 0; i -= 2) {
    ctx.shadowColor = '#ff2288';
    ctx.shadowBlur = i * 3;
    ctx.fillStyle = `rgba(255, 120, 180, ${0.05 + (14 - i) * 0.03})`;
    ctx.fillText(text, 512, 128);
  }
  // bright tube
  ctx.shadowColor = '#ff88cc';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#ffb4d8';
  ctx.fillText(text, 512, 128);
  // hot core
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff0f8';
  ctx.font = 'bold 128px "Brush Script MT", cursive';
  ctx.fillText(text, 512, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

    new THREE.MeshStandardMaterial({ color: 0x2a0a18 })
  );
  cord.position.set(-1.2, 3.2, 1.5);
  scene.add(cord);
  const shade = new THREE.Mesh(
    new THREE.ConeGeometry(0.22, 0.3, 12, 1, true),
    new THREE.MeshStandardMaterial({ color: 0xff88bb, emissive: 0xff66aa, emissiveIntensity: 0.8, side: THREE.DoubleSide, roughness: 0.5 })
  );
  shade.position.set(-1.2, 2.7, 1.5);
  scene.add(shade);
  const bulb2 = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0xffe0a8, emissive: 0xffbb66, emissiveIntensity: 3 })
  );
  bulb2.position.set(-1.2, 2.66, 1.5);
  scene.add(bulb2);
  // soft light from it
  const hangingLight = new THREE.PointLight(0xffaa88, 0.8, 4, 1.5);
  hangingLight.position.set(-1.2, 2.6, 1.5);
  scene.add(hangingLight);
}

// ═══════════════════════════════════════════════════════════════
// FLOATING DUST PARTICLES

    positions[i * 3]     = (Math.random() - 0.5) * 8;

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
const controls = new PointerLockControls(camera, renderer.domElement);

const promptEl = document.getElementById('prompt');
const hudEl = document.getElementById('hud');
const overlayEl = document.getElementById('desktop-overlay');
const iframe = document.getElementById('desktop-iframe');
const exitBtn = document.getElementById('exit-sit');

let state = 'walking'; // 'walking' | 'transitioning' | 'sitting'
let currentInteraction = null;
let tween = null;
let standingPose = null;

// Chrome enforces a ~1.25s cooldown after the user presses Escape to exit
// pointer lock. Clicking intro during that window throws a SecurityError
// which previously left the user stranded with the intro hidden. We now
// wait for the 'lock' event before hiding anything, and quietly swallow
// refusals so the intro panel stays clickable.
function attemptLock() {
  try {
    const res = controls.lock();
    // Newer browsers return a Promise from requestPointerLock. Swallow
    // the rejection so it doesn't propagate as an unhandled promise error.
    if (res && typeof res.catch === 'function') res.catch(() => {});
  } catch (e) {
    // SecurityError during cooldown — intentionally ignored.
  }
}

// Click the canvas (or anywhere outside the desktop overlay) to engage pointer lock.
document.addEventListener('click', (e) => {
  if (state !== 'walking') return;
  if (controls.isLocked) return;
  if (overlayEl && overlayEl.contains(e.target)) return; // ignore clicks on monitor UI
  attemptLock();
});

controls.addEventListener('unlock', () => {
  // No-op — splash removed. Player stays in 'walking' state when unlocked.
});

document.addEventListener('pointerlockerror', () => {
  // Silent — no splash to restore.
});

// movement
const keys = {};
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'KeyE' && state === 'walking' && currentInteraction === 'sit') {
    sitDown();
  }
  if (e.code === 'Escape' && state === 'sitting') {
    standUp();
  }
});
addEventListener('keyup', (e) => { keys[e.code] = false; });

exitBtn.addEventListener('click', () => {
  if (state === 'sitting') standUp();
});

function clampToRoom(p) {
  const pad = 0.35;
  p.x = Math.max(-ROOM.w / 2 + pad, Math.min(ROOM.w / 2 - pad, p.x));
  p.z = Math.max(-ROOM.d / 2 + pad, Math.min(ROOM.d / 2 - pad, p.z));
  // keep out of desk
  if (p.z < -ROOM.d / 2 + 1.1 && Math.abs(p.x) < 1.6) {
    p.z = -ROOM.d / 2 + 1.1;
  }
  p.y = 1.6;
}

// ═══════════════════════════════════════════════════════════════
// INTERACTION RAYCAST
// ═══════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const screenCenter = new THREE.Vector2(0, 0);
const interactables = [chairHitBox, monitorGroup.userData.screenMesh];

function checkInteraction() {
  if (state !== 'walking') {
    promptEl.classList.remove('show');
    currentInteraction = null;
    return;
  }
  raycaster.setFromCamera(screenCenter, camera);
  const hits = raycaster.intersectObjects(interactables, false);
  if (hits.length && hits[0].distance < 2.8) {
    promptEl.classList.add('show');
    currentInteraction = 'sit';
  } else {
    promptEl.classList.remove('show');
    currentInteraction = null;
  }
}

// ═══════════════════════════════════════════════════════════════
// SIT / STAND
// ═══════════════════════════════════════════════════════════════
function sitDown() {
  if (state !== 'walking') return;
  state = 'transitioning';
  controls.unlock();
  // remember where we were
  standingPose = {
    position: camera.position.clone(),
    quaternion: camera.quaternion.clone()
  };

  // target sitting camera: above the chair seat, looking at monitor
  const sitPos = new THREE.Vector3(0, 1.22, -2.95);
  const lookTarget = new THREE.Vector3(0, 1.42, -4.4);

  startTween(sitPos, lookTarget, 900, () => {
    state = 'sitting';
    // show overlay
    overlayEl.classList.add('active');
    // small delay for pretty transition
    requestAnimationFrame(() => {
      overlayEl.classList.add('visible');
    });
    // point iframe at desktop (pink-desktop.html lives at the repo root)
    if (iframe.src === 'about:blank' || !iframe.src.endsWith('desktop.html')) {
      iframe.src = 'desktop.html';
    }
    // turn the 3D monitor screen "on" (behind overlay for if you peek)
    const mat = monitorGroup.userData.screenMat;
    mat.map = monitorOnTex;
    mat.emissiveMap = monitorOnTex;
    mat.emissive.setHex(0xffffff);
    mat.emissiveIntensity = 0.9;
    mat.needsUpdate = true;
    hudEl.style.opacity = '0';
  });
}

function standUp() {
  if (state !== 'sitting') return;
  state = 'transitioning';
  overlayEl.classList.remove('visible');
  setTimeout(() => overlayEl.classList.remove('active'), 450);

  // back out and stand by the chair
  const standPos = new THREE.Vector3(0, 1.6, -2.2);
  const lookTarget = new THREE.Vector3(0, 1.5, -4.5);

  startTween(standPos, lookTarget, 800, () => {
    state = 'walking';
    hudEl.style.opacity = '1';
    // monitor stays on — no dimming
    // attemptLock will retry on failure and fall back to the intro panel
    attemptLock();
  });
}

function startTween(targetPos, lookTarget, duration, onComplete) {
  const startPos = camera.position.clone();
  const startQuat = camera.quaternion.clone();
  // compute target quaternion from lookAt
  const m = new THREE.Matrix4();
  m.lookAt(targetPos, lookTarget, new THREE.Vector3(0, 1, 0));
  const targetQuat = new THREE.Quaternion().setFromRotationMatrix(m);
  tween = {
    start: performance.now(),
    duration,
    startPos,
    targetPos,
    startQuat,
    targetQuat,
    onComplete
  };
}

function updateTween() {
  if (!tween) return;
  const t = Math.min(1, (performance.now() - tween.start) / tween.duration);
  // easeInOutCubic
  const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  camera.position.lerpVectors(tween.startPos, tween.targetPos, ease);
  camera.quaternion.slerpQuaternions(tween.startQuat, tween.targetQuat, ease);
  if (t >= 1) {
    const cb = tween.onComplete;
    tween = null;
    cb && cb();
  }
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let neonFlickerT = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  // forward-only movement (W or ArrowUp)
  if (state === 'walking' && controls.isLocked) {
    velocity.z -= velocity.z * 12 * dt;
    const speed = 22;
    if (keys.KeyW || keys.ArrowUp) velocity.z -= speed * dt;
    controls.moveForward(-velocity.z * dt);
    clampToRoom(camera.position);
  }

  updateTween();
  checkInteraction();

  // gentle neon flicker
  neonFlickerT += dt;
  const flicker = 0.9 + Math.sin(neonFlickerT * 8) * 0.05 + (Math.random() > 0.985 ? -0.25 : 0);
  neonLight.intensity = 2.8 * flicker;

  // lamp subtle pulse
  lampLight.intensity = 3.3 + Math.sin(neonFlickerT * 1.8) * 0.15;

  // dust drift
  const dust = scene.userData.dust;
  if (dust) {
    const pos = dust.geometry.attributes.position.array;
    for (let i = 0; i < pos.length; i += 3) {
      pos[i + 1] += dt * 0.08 * (0.5 + Math.sin((pos[i] + neonFlickerT) * 0.5) * 0.5);
      pos[i] += Math.sin(neonFlickerT * 0.4 + i) * dt * 0.02;
      if (pos[i + 1] > 3.4) pos[i + 1] = 0.1;
    }
    dust.geometry.attributes.position.needsUpdate = true;
  }

  // Sync CSS3D iframe to the 3D screen's world transform
  const cssScreen = monitorGroup.userData.cssScreen;
  const screenMesh = monitorGroup.userData.screenMesh;
  if (cssScreen && screenMesh) {
    screenMesh.getWorldPosition(cssScreen.position);
    screenMesh.getWorldQuaternion(cssScreen.quaternion);
  }

  renderer.render(scene, camera);
  cssRenderer.render(cssScene, camera);
}
animate();
