
<!DOCTYPE html>
<html lang="en">
	<head>
		<title>📱🌹💄</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link href="https://fonts.googleapis.com/css?family=Audiowide|Exo+2:300|VT323" rel="stylesheet">
    <link href="/cara/css/styles.css" rel="stylesheet">
	</head>
	<body style="cursor: move">
		<div id="container"></div>
		</div>

		<div id="cam-panel" style="position:fixed;top:1rem;left:1rem;z-index:100;background:rgba(0,0,0,0.7);color:#fff;padding:10px 12px;border-radius:6px;font-family:monospace;font-size:11px;max-width:230px;">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;cursor:pointer;" onclick="document.getElementById('cam-rows').style.display = document.getElementById('cam-rows').style.display === 'none' ? 'block' : 'none';">
				<strong>camera</strong><span style="opacity:.6;">⇅</span>
			</div>
			<div id="cam-rows"></div>
		</div>

		<script id="fragmentShader" type="x-shader/x-vertex">
			uniform vec3 glowColor;
			varying float intensity;
			void main()
			{
				vec3 glow = glowColor * intensity;
			   gl_FragColor = vec4( glow, 0.5 );
			}
		</script>

		<script id="vertexShader" type="x-shader/x-vertex">
			uniform vec3 viewVector;
			uniform float c;
			uniform float p;
			varying float intensity;
			void main() {
			  vec3 vNormal = normalize( normalMatrix * normal );
				vec3 vNormel = normalize( normalMatrix * viewVector );
				intensity = pow( c - dot(vNormal, vNormel), p );
			  gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
			}
		</script>
		<script>
			// detect mobile OS because point lights don't work on some android phones
			var usePointLights;
			if ( /Android/i.test(navigator.userAgent) ) {
				usePointLights = false;
			} else {
				usePointLights = true;
			};
		</script>
		<script src="/cara/build/three.js"></script>
		<script src="/cara/js/Mirror.js"></script>
		<script src="/cara/js/shaders/FresnelShader.js"></script>
		<script src="/cara/js/loaders/OBJLoader.js"></script>

		<script>
			// scene size
			var WIDTH = window.innerWidth,
				HEIGHT = window.innerHeight;

			// camera
			var VIEW_ANGLE = 35,
				ASPECT = WIDTH / HEIGHT,
				NEAR = 1,
				FAR = 10000;

			var camera, scene, renderer, models = [];
			var camTarget = new THREE.Vector3( 0, 100, 0 );
			var scrollDolly = 0, scrollDollyTarget = 0, basePos, fwd;
			var SCROLL_MIN = -600, SCROLL_MAX = 250;

			var clock = new THREE.Clock();
    	var shader = THREE.FresnelShader;
	    var uniforms = THREE.UniformsUtils.clone( shader.uniforms );

			init();
			animate();

			function init() {

				var container = document.getElementById( 'container' );

				// renderer
				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( WIDTH, HEIGHT );
				renderer.setClearColor( 0xffffff, 0);

				container.appendChild( renderer.domElement );

        // scene
				scene = new THREE.Scene()

				// cube bg
				var cube = new THREE.BoxBufferGeometry( 1000, 1000, 1000 );
				// invert the geometry on the x-axis so that all of the faces point inward
				cube.scale( - 1, 1, 1 );
				var gridMaterial = new THREE.MeshBasicMaterial( {
					map: new THREE.TextureLoader().load( './cubeTexture/grid.jpeg' )
				} );
				cubeBackgroundMesh = new THREE.Mesh( cube, gridMaterial );
				scene.add( cubeBackgroundMesh );

				// Stationary camera — no OrbitControls. Position + lookAt
				// frozen, sliders below let you nudge values live.
				camera = new THREE.PerspectiveCamera(VIEW_ANGLE, ASPECT, NEAR, FAR);
				camera.position.set( 295, 100, 0 );
				camera.lookAt( camTarget );

				// Scroll = dolly along the camera's forward axis
				basePos = camera.position.clone();
				fwd = new THREE.Vector3().subVectors( camTarget, basePos ).normalize();

				// Driven mode = parent page sends scroll progress via postMessage.
				// Standalone mode = wheel/touch listeners drive the camera directly.
				var DRIVEN = /[?&]driven=1/.test( window.location.search );

				if ( DRIVEN ) {
					window.addEventListener( 'message', function ( e ) {
						if ( e.data && e.data.type === 'lipstick2-progress' ) {
							var v = +e.data.value;
							if ( v < 0 ) v = 0;
							if ( v > 1 ) v = 1;
							// progress 0 → SCROLL_MIN-ish (start back), 1 → SCROLL_MAX (end forward)
							scrollDollyTarget = v * SCROLL_MAX;
						}
					} );
					// notify parent we're ready
					try { window.parent.postMessage( { type: 'lipstick2-ready' }, '*' ); } catch ( e ) {}
				} else {
					window.addEventListener( 'wheel', function ( e ) {
						e.preventDefault();
						scrollDollyTarget += e.deltaY * 0.5;
						if ( scrollDollyTarget < SCROLL_MIN ) scrollDollyTarget = SCROLL_MIN;
						if ( scrollDollyTarget > SCROLL_MAX ) scrollDollyTarget = SCROLL_MAX;
					}, { passive: false } );

					var touchLastY = 0;
					window.addEventListener( 'touchstart', function ( e ) {
						if ( e.touches[0] ) touchLastY = e.touches[0].clientY;
					}, { passive: true } );
					window.addEventListener( 'touchmove', function ( e ) {
						if ( ! e.touches[0] ) return;
						e.preventDefault();
						var y = e.touches[0].clientY;
						var dy = touchLastY - y;
						touchLastY = y;
						scrollDollyTarget += dy * 1.2;
						if ( scrollDollyTarget < SCROLL_MIN ) scrollDollyTarget = SCROLL_MIN;
						if ( scrollDollyTarget > SCROLL_MAX ) scrollDollyTarget = SCROLL_MAX;
					}, { passive: false } );
				}

				// model
			  var texture = new THREE.Texture();

				var materialFresnel = new THREE.ShaderMaterial( {
          uniforms: uniforms,
          vertexShader: shader.vertexShader,
          fragmentShader: shader.fragmentShader
				} );

				var materialGlow = new THREE.ShaderMaterial({
			    uniforms: {
						"c":   { type: "f", value: 1.0 },
						"p":   { type: "f", value: 1.4 },
						glowColor: { type: "c", value: new THREE.Color(0xFF1493) },
						viewVector: { type: "v3", value: camera.position }
					},
					vertexShader:   document.getElementById( 'vertexShader'   ).textContent,
					fragmentShader: document.getElementById( 'fragmentShader' ).textContent,
					side: THREE.FrontSide,
					blending: THREE.AdditiveBlending,
					transparent: true
				});

				var materialNormal = new THREE.MeshNormalMaterial( { overdraw: 1 } );

				var manager = new THREE.LoadingManager();
				manager.onProgress = function ( item, loaded, total ) {
					console.log( item, loaded, total );
				};

				var onProgress = function ( xhr ) {
					if ( xhr.lengthComputable ) {
						var percentComplete = xhr.loaded / xhr.total * 100;
						console.log( Math.round(percentComplete, 2) + '% downloaded' );
					}
				};

		  	var loader = new THREE.OBJLoader(manager);

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/lipstick.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				   });
		    		object.position.x = ((Math.random() * window.innerWidth)-window.innerWidth) % 1000;
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 40 - 0;
				    object.rotation.z = Math.random() * 40 - 0;
				    object.scale.x = 11;
				    object.scale.y = 11;
				    object.scale.z = 11;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/clutch.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				  });
		    		object.position.x = ((Math.random() * window.innerWidth) - window.innerWidth);
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 90 - 0;
				    object.rotation.z = Math.random() * 90 - 0;
				    object.scale.x = object.scale.y = object.scale.z = 40;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("./obj/plant.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				  });
				    object.scale.x = object.scale.y = object.scale.z = 40;
				    object.position.x = -150;
				    object.position.z = -300;
				    object.position.y = 25;

				    obj = object;
				    scene.add(obj);
				  });
		  	}

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/plant.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				  });
				    object.scale.x = object.scale.y = object.scale.z = 40;
				    object.position.x = 150;
				    object.position.z = -300;
				    object.position.y = 25;
				    obj = object;
				    scene.add(obj);
				  });
		  	}

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/rose.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				  });
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 90 - 0;
				    object.rotation.z = Math.random() * 100 - 50;
				    object.scale.x = object.scale.y = object.scale.z = 20;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}


	      for ( var i = 0; i < 3; i ++ ) {
		  		loader.load("obj/heart.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialGlow;
		            materialGlow.side = THREE.DoubleSide;
			      }
				   });
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 90 - 0;
				    object.rotation.z = Math.random() * 90 - 0;
				    object.scale.x = object.scale.y = object.scale.z = 15;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}

	      for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/lighter.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialGlow;
		            materialGlow.side = THREE.DoubleSide;
			      }
				   });
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 90 - 0;
				    object.rotation.z = Math.random() * 90 - 0;
				    object.scale.x = object.scale.y = object.scale.z = 12;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}

				for ( var i = 0; i < 1; i ++ ) {
		  		loader.load("obj/cellphone.obj", function(object) {
		    		object.traverse(function(child) {
		      		if (child instanceof THREE.Mesh) {
		            child.material.map = texture;
		    				child.material = materialNormal;
		            materialNormal.side = THREE.DoubleSide;
			      }
				   });
		    		object.position.x = ((Math.random() * 100-100));
		    		object.position.y = (Math.random() * 150) + 20;
						object.position.z = (Math.random() * 60) - 60;

				    object.rotation.x = Math.random() * 40 - 0;
				    object.rotation.y = Math.random() * 40 - 0;
				    object.rotation.z = Math.random() * 40 - 0;
				    object.scale.x = object.scale.y = object.scale.z = 0.05;
				    obj = object;
				    scene.add(obj);
				    models.push(obj);
				  });
		  	}
				//

				var planeGeo = new THREE.PlaneBufferGeometry( window.innerWidth / 1.5, window.innerHeight / 2);

				// MIRROR planes

				var groundMirror = new THREE.Mirror( window.innerWidth, window.innerHeight / 2, {
					clipBias: 0.003,
					textureWidth: WIDTH * window.devicePixelRatio,
					textureHeight: HEIGHT * window.devicePixelRatio,
					color: 0x777777
				} );

				groundMirror.rotateX( - Math.PI / 2 );
				scene.add( groundMirror );

				var verticalMirror = new THREE.Mirror( 120, 120, {
					clipBias: 0.003,
					textureWidth: WIDTH * window.devicePixelRatio,
					textureHeight: HEIGHT * window.devicePixelRatio,
					color: 0x777777
				} );

				verticalMirror.position.y = 95;
				verticalMirror.position.z = -85;
				scene.add( verticalMirror );

				// walls

				var wallMaterial;
				if (usePointLights) {
					wallMaterial = new THREE.MeshPhongMaterial( { color: 0xffffff, shininess: 100 } );
					wallMaterialTop = new THREE.MeshPhongMaterial( { color: 0xffffff, shininess: 100 } );
				} else {
					wallMaterial = new THREE.MeshBasicMaterial( { color: 0x5b23aa} );
					wallMaterialTop = new THREE.MeshBasicMaterial( { color: 0x3e0c71} );
				}

				var planeTop =  new THREE.Mesh( planeGeo, wallMaterialTop );
				planeTop.position.y = 200;
				planeTop.rotateX( Math.PI / 2 );
				scene.add( planeTop );

				var planeBack = new THREE.Mesh( planeGeo, wallMaterial );
				planeBack.position.z = -100;
				planeBack.position.y = 100;
				scene.add( planeBack );

				var planeFront =  new THREE.Mesh( planeGeo, wallMaterial );
				planeFront.position.z = 100;
				planeFront.position.y = 100;
				planeFront.rotateY( Math.PI );
				scene.add( planeFront );

				// lights
				var mainPurpleLight = new THREE.PointLight( 0x7F00FF, 1.5, 200 );
				mainPurpleLight.position.y = 120;
				scene.add( mainPurpleLight );

				var hotPinkLight = new THREE.PointLight( 0xFF1493, 0.5, 50 );
				hotPinkLight.position.set( 550, 100, 0 );
				scene.add( hotPinkLight );

				var hotPinkLight = new THREE.PointLight( 0xFF1493, 0.5, 500 );
				hotPinkLight.position.set( - 550, 100, 0 );
				scene.add( hotPinkLight );

				var hotPinkLight = new THREE.PointLight( 0xFF1493, 0.5, 1000 );
				hotPinkLight.position.set( 0, 100, 550 );
				scene.add( hotPinkLight );

				window.addEventListener( 'resize', onWindowResize, false );
			}

			function onWindowResize() {
				windowHalfX = window.innerWidth / 2;
				windowHalfY = window.innerHeight / 2;
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function animate() {
				requestAnimationFrame( animate );
        var delta = clock.getDelta();
				var timer = 0.0001 * Date.now();

				for ( var i = 0; i < models.length; i ++ ) {
					if (usePointLights) {
						models[i].rotation.x += delta * 0.3 * ( i % 2 ? 1 : -1 );
					}
          models[i].position.x = 50 * Math.sin( timer + i );
				}

				// Smooth dolly along forward axis
				if ( typeof scrollDollyTarget === 'number' ) {
					scrollDolly += ( scrollDollyTarget - scrollDolly ) * 0.08;
					camera.position.x = basePos.x + fwd.x * scrollDolly;
					camera.position.y = basePos.y + fwd.y * scrollDolly;
					camera.position.z = basePos.z + fwd.z * scrollDolly;
					camera.lookAt( camTarget );
				}

				renderer.render(scene, camera);
			}

			// ============ CAMERA SETTINGS PANEL ============
			(function buildCamPanel() {
				// Hide panel entirely when the page is driven by a parent (public-facing).
				if ( /[?&]driven=1/.test( window.location.search ) ) {
					var p = document.getElementById('cam-panel');
					if ( p ) p.style.display = 'none';
					return;
				}
				var rowsEl = document.getElementById('cam-rows');
				if ( ! rowsEl ) return;

				function row( label, min, max, step, get, set ) {
					var div = document.createElement('div');
					div.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:4px;';
					var lbl = document.createElement('label');
					lbl.textContent = label;
					lbl.style.cssText = 'flex:0 0 70px;opacity:.75;';
					var slider = document.createElement('input');
					slider.type = 'range';
					slider.min = String(min);
					slider.max = String(max);
					slider.step = String(step);
					slider.value = String(get());
					slider.style.cssText = 'flex:1;min-width:80px;';
					var val = document.createElement('span');
					val.style.cssText = 'flex:0 0 38px;text-align:right;opacity:.65;';
					val.textContent = (+slider.value).toFixed(step >= 1 ? 0 : 2);
					slider.addEventListener('input', function () {
						var v = parseFloat(slider.value);
						set( v );
						val.textContent = v.toFixed(step >= 1 ? 0 : 2);
						camera.lookAt( camTarget );
					});
					div.appendChild(lbl);
					div.appendChild(slider);
					div.appendChild(val);
					rowsEl.appendChild(div);
					return slider;
				}

				row('pos x',     -800, 800, 1,   function () { return camera.position.x; }, function ( v ) { camera.position.x = v; });
				row('pos y',     -400, 400, 1,   function () { return camera.position.y; }, function ( v ) { camera.position.y = v; });
				row('pos z',     -800, 800, 1,   function () { return camera.position.z; }, function ( v ) { camera.position.z = v; });
				row('target x',  -300, 300, 1,   function () { return camTarget.x; }, function ( v ) { camTarget.x = v; });
				row('target y',  -100, 400, 1,   function () { return camTarget.y; }, function ( v ) { camTarget.y = v; });
				row('target z',  -300, 300, 1,   function () { return camTarget.z; }, function ( v ) { camTarget.z = v; });
				row('fov',          5, 120, 1,   function () { return camera.fov; }, function ( v ) { camera.fov = v; camera.updateProjectionMatrix(); });
				row('near',      0.01, 100, 0.1, function () { return camera.near; }, function ( v ) { camera.near = v; camera.updateProjectionMatrix(); });
				row('far',        500, 20000, 100, function () { return camera.far; }, function ( v ) { camera.far = v; camera.updateProjectionMatrix(); });
				row('up x',        -1,   1, 0.01, function () { return camera.up.x; }, function ( v ) { camera.up.x = v; });
				row('up y',        -1,   1, 0.01, function () { return camera.up.y; }, function ( v ) { camera.up.y = v; });
				row('up z',        -1,   1, 0.01, function () { return camera.up.z; }, function ( v ) { camera.up.z = v; });
			})();
		</script>
	</body>
</html>
